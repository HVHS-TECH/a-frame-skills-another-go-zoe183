<!DOCTYPE html>
<html>
    <head>
        <script src="https://aframe.io/releases/1.0.0/aframe.min.js"></script>
        <title>Radioactive Signals</title>
    </head>
    <body>
        <a-scene>
            <!-- Set the sky -->
            <a-sky color="lightblue"></a-sky>
<a-circle color="yellow" radius-bottom="5" radius-top="5"
                position="8 5 -15" height="5"
                top-radius="5" bottom-radius="5"
                    animation="
                    property: rotation;
                    from: 0 0 0;
                    to: 0 360 0;
                    loop: true;
                    dir: alternate;
                    "
                ></a-circle>
        </a-scene>
    </body>
</html>
